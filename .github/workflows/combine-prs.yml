name: Multi-PR Combined Build

on:
  workflow_dispatch:
    inputs:
      pr_numbers:
        description: 'Comma-separated PR numbers (e.g., "1135,1140,1142")'
        required: true
        type: string
      upstream_repo:
        description: 'Upstream repo (default: nextlevelbuilder/goclaw)'
        required: false
        type: string
        default: nextlevelbuilder/goclaw

jobs:
  build-merged:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream main
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.upstream_repo }}
          ref: main
          path: upstream
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create temp branch
        run: |
          cd upstream
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b prs-merge/${{ github.run_id }}

      - name: Fetch and merge PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd upstream

          for pr in $(echo "${{ inputs.pr_numbers }}" | tr ',' ' '); do
            pr_num=$(echo $pr | tr -d '[:space:]')
            echo "=== Merging PR #$pr_num ==="

            # Get PR details
            pr_json=$(gh pr view $pr_num --repo ${{ inputs.upstream_repo }} --json number,title,headRefName,headRepository --jq '.')

            pr_branch=$(echo "$pr_json" | jq -r '.headRefName')
            pr_repo=$(echo "$pr_json" | jq -r '.headRepository.fullName')

            echo "PR #$pr_num: $pr_repo:$pr_branch"

            # Fetch the PR branch
            git fetch "https://x-access-token:$GH_TOKEN@github.com/$pr_repo.git" "refs/heads/$pr_branch"

            # Merge it
            if git merge --no-edit FETCH_HEAD; then
              echo "✓ Merged PR #$pr_num"
            else
              echo "✗ Failed to merge PR #$pr_num"
              git merge --abort || true
              exit 1
            fi
          done

      - name: Build Go
        id: build
        run: |
          cd upstream
          go build ./...
          echo "✓ Build passed"
          echo "build_status=✓ Build passed" >> $GITHUB_OUTPUT

      - name: Run tests
        id: tests
        run: |
          cd upstream
          go test ./... 2>&1 | head -50
          echo "tests_status=✓ Tests completed" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## Combined Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| PR |" >> $GITHUB_STEP_SUMMARY
          echo "|----|" >> $GITHUB_STEP_SUMMARY
          for pr in $(echo "${{ inputs.pr_numbers }}" | tr ',' ' '); do
            pr_num=$(echo $pr | tr -d '[:space:]')
            pr_title=$(gh pr view $pr_num --repo ${{ inputs.upstream_repo }} --json title -q '.title')
            echo "| #$pr_num | $pr_title |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** ${{ steps.build.outputs.build_status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ${{ steps.tests.outputs.tests_status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY