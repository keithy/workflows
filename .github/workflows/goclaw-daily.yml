name: Scheduled Combined Build

on:
  workflow_dispatch:
  schedule:
    # Weekdays at 6 AM UTC
    - cron: '0 6 * * 1-5'

jobs:
  sync:
    name: Sync upstream/${{ matrix.upstream_branch }}
    strategy:
      matrix:
        upstream_branch: [main, dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync fork
        run: |
          gh workflow run sync-fork.yml \
            --field output_repo='keithy/goclaw' \
            --field upstream_repo='nextlevelbuilder/goclaw' \
            --field branches='${{ matrix.upstream_branch }}'

          sleep 3
          RUN_ID=$(gh run list --workflow=sync-fork.yml --limit=1 --json databaseId --jq '.[0].databaseId')
          gh run watch "$RUN_ID" --exit-status || true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  merge-essential:
    name: Merge essential into ${{ matrix.upstream_branch }}
    strategy:
      matrix:
        upstream_branch: [main, dev]
    uses: ./.github/workflows/merge-prs-workflow.yml
    with:
      pr_numbers: '1135'
      upstream_repo: nextlevelbuilder/goclaw
      upstream_branch: ${{ matrix.upstream_branch }}
      output_repo: keithy/goclaw
      branch_name: ${{ matrix.upstream_branch }}+essential-prs
    secrets: inherit

  merge-testing:
    name: Merge testing into ${{ matrix.upstream_branch }}
    strategy:
      matrix:
        upstream_branch: [main]
    uses: ./.github/workflows/merge-prs-workflow.yml
    with:
      pr_numbers: '1135'
      upstream_repo: nextlevelbuilder/goclaw
      upstream_branch: ${{ matrix.upstream_branch }}
      output_repo: keithy/goclaw
      branch_name: ${{ matrix.upstream_branch }}+testing-prs
    secrets: inherit
