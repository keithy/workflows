name: Scheduled Combined Build

on:
  workflow_dispatch:
  schedule:
    # Weekdays at 6 AM UTC
    - cron: '0 6 * * 1-5'

jobs:
  trigger-combine-prs:
    permissions:
      actions: write
    strategy:
      matrix:
        upstream_branch: [main, dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trigger combine-prs for ${{ matrix.upstream_branch }}
        id: trigger
        run: |
          gh workflow run test-prs-workflow.yml \
            --field pr_numbers='485,1016,1135,1138' \
            --field upstream_repo='nextlevelbuilder/goclaw' \
            --field upstream_branch='${{ matrix.upstream_branch }}' \
            --field output_repo='keithy/goclaw' \
            --field branch_name='${{ matrix.upstream_branch }}-working'
          
          # Wait for the run to appear and get its ID
          sleep 3
          RUN_ID=$(gh run list --workflow=test-prs-workflow.yml --limit=1 --json databaseId --jq '.[0].databaseId')
          RUN_URL=$(gh run view "$RUN_ID" --json url --jq '.url')
          echo "run_id=$RUN_ID"
          echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
          
          # Write to summary immediately
          echo "## ${{ matrix.upstream_branch }}: test-prs-workflow" >> $GITHUB_STEP_SUMMARY
          echo "Triggered: $RUN_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          gh run watch "$RUN_ID" --exit-status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Summary (on failure)
        if: failure()
        run: |
          echo "## ${{ matrix.upstream_branch }}: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "See logs: ${{ steps.trigger.outputs.run_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY