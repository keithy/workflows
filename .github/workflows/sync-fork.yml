name: Sync Fork

on:
  workflow_dispatch:
    inputs:
      output_repo:
        description: 'Fork repo to update (default: keithy/goclaw)'
        required: false
        type: string
        default: keithy/goclaw
      upstream_repo:
        description: 'Upstream repo (default: nextlevelbuilder/goclaw)'
        required: false
        type: string
        default: nextlevelbuilder/goclaw
      branch:
        description: 'Branch to sync (default: main)'
        required: false
        type: string
        default: main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync branch
        run: |
          git clone "https://x-access-token:$PAT@github.com/${{ inputs.output_repo }}.git" .
          git remote add src_remote "https://x-access-token:$PAT@github.com/${{ inputs.upstream_repo }}.git"
          git fetch src_remote --quiet
          rm -rf ${{ inputs.branch }}
          git push origin "refs/remotes/src_remote/${{ inputs.branch }}:refs/heads/${{ inputs.branch }}" --force
          git tag -d $(git tag -l)
          git fetch src_remote --tags --quiet
          git push origin --tags --force
        env:
          PAT: ${{ secrets.GH_TOKEN }}

      - name: Summary
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          UPSTREAM_SHA=$(gh api repos/${{ inputs.upstream_repo }}/branches/${{ inputs.branch }} --jq '.commit.sha')
          echo "## Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Synced:** ${{ inputs.upstream_repo }}/${{ inputs.branch }} → ${{ inputs.output_repo }}/${{ inputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$(echo $UPSTREAM_SHA | cut -c1-7)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY