name: Merge PRs Workflow

on:
  workflow_call:
    inputs:
      pr_numbers:
        description: 'Comma-separated PR numbers'
        required: true
        type: string
      upstream_repo:
        description: 'Upstream repo'
        required: true
        type: string
      upstream_branch:
        description: 'Branch to merge onto'
        required: true
        type: string
      output_repo:
        description: 'Fork repo to push merged branch'
        required: true
        type: string
      branch_name:
        description: 'Branch name to create/update'
        required: true
        type: string
    secrets:
      GH_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      pr_numbers:
        description: 'Comma-separated PR numbers (e.g., "1135,1140,1142")'
        required: true
        type: string
      upstream_repo:
        description: 'Upstream repo (default: nextlevelbuilder/goclaw)'
        required: false
        type: string
        default: nextlevelbuilder/goclaw
      upstream_branch:
        description: 'Branch to merge onto (default: main)'
        required: false
        type: string
        default: main
      output_repo:
        description: 'Fork repo to push merged branch (default: keithy/goclaw)'
        required: false
        type: string
        default: keithy/goclaw
      branch_name:
        description: 'Branch name to create/update in output_repo'
        required: true
        type: string

jobs:
  build-merged:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream main
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.upstream_repo }}
          ref: ${{ inputs.upstream_branch }}
          path: upstream
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Create temp branch
        run: |
          cd upstream
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b prs-merge/${{ github.run_id }}

      - name: Fetch and merge PRs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd upstream

          for pr in $(echo "${{ inputs.pr_numbers }}" | tr ',' ' '); do
            pr_num=$(echo $pr | tr -d '[:space:]')
            echo "=== Merging PR #$pr_num ==="

            # Get PR details
            pr_json=$(gh pr view $pr_num --repo ${{ inputs.upstream_repo }} --json number,title,headRefName,headRepository,isDraft --jq '.')

            pr_branch=$(echo "$pr_json" | jq -r '.headRefName // empty')
            pr_repo=$(echo "$pr_json" | jq -r '.headRepository.nameWithOwner // .headRepository.owner.login // empty')

            if [ -z "$pr_branch" ] || [ "$pr_branch" = "null" ]; then
              echo "✗ Could not get branch for PR #$pr_num"
              echo "JSON: $pr_json"
              exit 1
            fi

            if [ -z "$pr_repo" ] || [ "$pr_repo" = "null" ]; then
              echo "✗ Could not get repo for PR #$pr_num"
              echo "JSON: $pr_json"
              exit 1
            fi

            echo "PR #$pr_num: $pr_repo:$pr_branch"

            # Fetch the PR branch
            git fetch "https://x-access-token:$GH_TOKEN@github.com/$pr_repo.git" "refs/heads/$pr_branch"

            # Merge it (allow unrelated histories for cross-fork PRs)
            if git merge --no-edit --allow-unrelated-histories FETCH_HEAD; then
              echo "✓ Merged PR #$pr_num"
            else
              echo "✗ Failed to merge PR #$pr_num"
              git merge --abort || true
              exit 1
            fi
          done

      - name: Push merged branch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd upstream
          
          # Backup existing remote branch if it exists (fetch it first)
          if git ls-remote --heads "https://x-access-token:$GH_TOKEN@github.com/${{ inputs.output_repo }}.git" "${{ inputs.branch_name }}" | grep -q .; then
            echo "Backing up existing branch: ${{ inputs.branch_name }}"
            git push "https://x-access-token:$GH_TOKEN@github.com/${{ inputs.output_repo }}.git" \
              "refs/heads/${{ inputs.branch_name }}:refs/backup/${{ inputs.branch_name }}-$(date +%Y%m%d-%H%M%S)" || true
          fi
          
          # Force push the merged branch (overwrite existing)
          git push --force "https://x-access-token:$GH_TOKEN@github.com/${{ inputs.output_repo }}.git" \
            "prs-merge/${{ github.run_id }}:${{ inputs.branch_name }}"
          echo "branch_url=https://github.com/${{ inputs.output_repo }}/tree/${{ inputs.branch_name }}" >> $GITHUB_OUTPUT

      - name: Summary
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "## Combined Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | Title | Author |" >> $GITHUB_STEP_SUMMARY
          echo "|----|----|----|" >> $GITHUB_STEP_SUMMARY
          for pr in $(echo "${{ inputs.pr_numbers }}" | tr ',' ' '); do
            pr_num=$(echo $pr | tr -d '[:space:]')
            pr_data=$(gh pr view $pr_num --repo ${{ inputs.upstream_repo }} --json number,title,author --jq '{number: .number, title: .title, author: .author.login}')
            pr_number=$(echo "$pr_data" | jq -r '.number')
            pr_title=$(echo "$pr_data" | jq -r '.title')
            pr_author=$(echo "$pr_data" | jq -r '.author')
            echo "| #$pr_number | $pr_title | @$pr_author |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Output:** [https://github.com/${{ inputs.output_repo }}](https://github.com/${{ inputs.output_repo }})" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** [${{ inputs.branch_name }}](https://github.com/${{ inputs.output_repo }}/tree/${{ inputs.branch_name }})" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY