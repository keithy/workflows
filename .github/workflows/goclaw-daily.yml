name: Scheduled Combined Build

on:
  workflow_dispatch:
  schedule:
    # Weekdays at 6 AM UTC
    - cron: '0 6 * * 1-5'

jobs:
  sync-and-merge:
    permissions:
      actions: write
    strategy:
      matrix:
        upstream_branch: [main, dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync fork
        id: sync
        run: |
          gh workflow run sync-fork.yml \
            --field output_repo='keithy/goclaw' \
            --field upstream_repo='nextlevelbuilder/goclaw' \
            --field branch='${{ matrix.upstream_branch }}'
          
          sleep 3
          RUN_ID=$(gh run list --workflow=sync-fork.yml --limit=1 --json databaseId --jq '.[0].databaseId')
          gh run watch "$RUN_ID" --exit-status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger merge-prs for ${{ matrix.upstream_branch }}
        id: trigger
        env:
          BRANCH_NAME: ${{ matrix.upstream_branch }}+essential-prs
        run: |
          gh workflow run merge-prs-workflow.yml \
            --field pr_numbers='485,1016,1135,1138' \
            --field upstream_repo='nextlevelbuilder/goclaw' \
            --field upstream_branch='${{ matrix.upstream_branch }}' \
            --field output_repo='keithy/goclaw' \
            --field branch_name="$BRANCH_NAME"

          # Wait for the run to appear and get its ID
          sleep 3
          RUN_ID=$(gh run list --workflow=merge-prs-workflow.yml --limit=1 --json databaseId --jq '.[0].databaseId')
          RUN_URL=$(gh run view "$RUN_ID" --json url --jq '.url')
          echo "run_id=$RUN_ID"
          echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT

          # Write to summary immediately
          echo "## ${{ matrix.upstream_branch }}: $BRANCH_NAME" >> $GITHUB_STEP_SUMMARY
          echo "Triggered: $RUN_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          gh run watch "$RUN_ID" --exit-status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Summary (on failure)
        if: failure()
        run: |
          echo "## ${{ matrix.upstream_branch }}: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "Triggered: ${{ steps.trigger.outputs.run_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      - name: Summary (on success)
        if: success()
        run: |
          echo "## ${{ matrix.upstream_branch }}: merge-prs-workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Output:** [https://github.com/keithy/goclaw](https://github.com/keithy/goclaw)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** [${{ matrix.upstream_branch }}-working](https://github.com/keithy/goclaw/tree/${{ matrix.upstream_branch }}-working)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
